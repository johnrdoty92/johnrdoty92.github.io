      .initials {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: clamp(50px, 50vw, 200px);
      }

      .initials #wave path {
        animation: logo-loader 4s ease-in-out infinite alternate;
      }

      .initials .background-letters {
        fill: var(--primary);
      }

      .initials .foreground-letters {
        fill: var(--secondary);
      }

      @keyframes logo-loader {
        from {
          transform: translate(-1000px, 0px);
        }

        to {
          transform: translate(0px, -100px);
        }
      }
    </style>
